<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Tab AutoSort</h1>
  <p class="description">Tabs are sorted by title every 5 minutes. Add regex patterns below to group matching tabs. Each unique match becomes its own group.</p>

  <div class="keyword-input">
    <input type="text" id="newKeyword" placeholder="e.g. DEVOPS-\d+">
    <button id="addBtn">Add</button>
  </div>

  <ul id="keywordList"></ul>

  <div class="actions">
    <button id="sortNowBtn">Sort Now</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
